name: Pick New Word

on:
  schedule:
    - cron: '0 0 * * *'  # runs daily at midnight UTC
  workflow_dispatch:

jobs:
  update-word:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run new_word.py
        run: python new_word.py

      - name: Commit and push updated words.json
        run: |
          git config user.name "wordle bot"
          git config user.email "wordle_bot@users.noreply.github.com"
          git add words.json
          git diff --staged --quiet || git commit -m "chore: pick new daily word"
          git push