<!-- MAIN -->
<main>
    <div id="loading">Loading today's slang...</div>

    <div id="game-container" style="display:none;">
        <!-- UD-Style Card -->
        <div class="word-card">
            <h1>Urban Wordle</h1>
            <div class="tagline">by the streets · word game · 1–6 guesses</div>
            <div class="definition">
                Guess the <strong>5-letter slang word or acronym</strong> in 6 tries. no cap, no basic words here.
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-tile lt-green">A</div> Correct spot
                    </div>
                    <div class="legend-item">
                        <div class="legend-tile lt-yellow">B</div> Wrong spot
                    </div>
                    <div class="legend-item">
                        <div class="legend-tile lt-gray">C</div> Not in word
                    </div>
                </div>
            </div>
        </div>

        <!-- Board -->
        <div id="board"></div>

        <!-- Result (shown after win/lose) -->
        <div id="result-section">
            <h2 id="result-title"></h2>
            <p id="result-sub"></p>
            <div id="result-answer" class="answer-reveal" style="display:none;"></div>
            <button class="btn-share" onclick="copyResultToClipboard()">Share Results 📋</button>
        </div>
        <br>
        <!-- Keyboard -->
        <div id="keyboard"></div>
    </div>
</main>

<!-- TOAST -->
<div id="toast"></div>

<!-- FOOTER -->
<footer>
    Urban Wordle · Not affiliated with Urban Dictionary
</footer>
